[project]
# Project configuration

[api]
enabled = true
port = 54321
max_rows = 1000

[db]
port = 54322

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://mmq.game"
# JWT有効期限: 7日（604800秒）- Supabase Cloud最大値
jwt_expiry = 604800
additional_redirect_urls = [
  "https://mmq.game/**",
  "https://mmq-yoyaq.vercel.app/**",
  "http://localhost:5173/**",
  "http://localhost:3000/**"
]

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

[edge_functions]
# Edge Functions configuration
# Note: Cron Jobs are configured in Supabase Dashboard, not here

# delete-my-account は関数内でJWT検証を行うため、ゲートウェイでの検証をスキップ
[functions.delete-my-account]
verify_jwt = false

# send-contact-inquiry は公開フォーム用（認証不要）
[functions.send-contact-inquiry]
verify_jwt = false
