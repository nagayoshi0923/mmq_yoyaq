<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Queens Waltz - マーダーミステリー店舗管理システム</title>
    <meta name="description" content="Queens Waltz マーダーミステリー6店舗対応の統合管理システム" />
    
    <!-- ファビコン -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    
    <!-- Preload 重要リソース（本番ビルド後のファイル名に合わせて調整） -->
    <!-- 注意: ビルド後に生成されるハッシュ付きファイル名は自動的に処理されます -->
    
    <!-- DNS Prefetch: Supabase への接続を事前解決 -->
    <link rel="dns-prefetch" href="https://bgztzakvjzudvdmfyhyh.supabase.co" />
    <link rel="preconnect" href="https://bgztzakvjzudvdmfyhyh.supabase.co" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 古いキャッシュ検知: Reactロード前にビルドハッシュを比較し、古ければ自動リロード
      // インラインなのでバンドルキャッシュに依存しない
      (function(){
        if (sessionStorage.getItem('_vck')) return; // 無限ループ防止
        var scripts = document.querySelectorAll('script[type="module"][src]');
        var hash = null;
        for (var i = 0; i < scripts.length; i++) {
          var src = scripts[i].getAttribute('src');
          if (src && src.indexOf('/assets/index-') !== -1) {
            var m = src.match(/index-([^.]+)\.js/);
            if (m) hash = m[1];
          }
        }
        if (!hash) return; // 開発環境（ハッシュなし）はスキップ
        fetch('/?_t=' + Date.now(), { headers: { Accept: 'text/html' }, cache: 'no-cache' })
          .then(function(r) { return r.ok ? r.text() : null; })
          .then(function(html) {
            if (!html) return;
            var m = html.match(/index-([^.]+)\.js/);
            if (m && m[1] !== hash) {
              sessionStorage.setItem('_vck', '1');
              location.reload();
            }
          })
          .catch(function() {});
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
