name: Morning TODO → Discord

on:
  schedule:
    - cron: '30 22 * * *' # 07:30 JST (UTC+9)
  workflow_dispatch: # 手動テスト用

jobs:
  todo:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      pull-requests: read
      contents: read
    steps:
      - name: Build and send TODO
        env:
          GH_TOKEN: ${{ github.token }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          if [ -z "$WEBHOOK" ]; then echo "DISCORD_WEBHOOK_URL 未設定のためスキップします"; exit 0; fi
          TODAY=$(TZ=Asia/Tokyo date '+%-m/%-d')

          # open かつ non-draft の PR。放置忘れ対策に未更新日数と直接URLを載せる。最大10件。
          PRS=$(gh pr list -R "$REPO" --state open --json number,title,isDraft,updatedAt,url \
            --jq '[.[] | select(.isDraft|not)] | .[0:10] | map("・#\(.number) \(.title[0:40]) (\((now - (.updatedAt|fromdateiso8601)) / 86400 | floor)日未更新)\n  \(.url)") | join("\n")')

          NH=$(gh issue list -R "$REPO" --state open --label needs-human --json number,title \
            --jq '.[0:10] | map("・#\(.number) \(.title[0:44])") | join("\n")')

          NI=$(gh issue list -R "$REPO" --state open --label needs-info --json number,title,updatedAt \
            --jq '.[0:10] | map("・#\(.number) \(.title[0:40]) (\((now - (.updatedAt|fromdateiso8601)) / 86400 | floor)日停滞)") | join("\n")')

          NOLABEL=$(gh issue list -R "$REPO" --state open --json number,title,labels \
            --jq '[.[] | select(.labels|length==0)] | .[0:10] | map("・#\(.number) \(.title[0:44])") | join("\n")')

          AITODO=$(gh issue list -R "$REPO" --state open --label ai-todo --json number,title \
            --jq '.[0:10] | map("・#\(.number) \(.title[0:44])") | join("\n")')

          AF=$(gh issue list -R "$REPO" --state open --label automation-failed --json number,title,url \
            --jq '.[0:10] | map("・#\(.number) \(.title[0:40])\n  \(.url)") | join("\n")')

          AHEAD=$(gh api "repos/$REPO/compare/main...staging" --jq '.ahead_by' 2>/dev/null || echo 0)
          DEPLOY=""
          if [ "$AHEAD" -gt 0 ]; then
            DEPLOY="stagingにmain未反映のコミットが ${AHEAD} 件"$'\n'"<https://github.com/${REPO}/compare/main...staging>"
          fi

          MSG="☀️ **今日のTODO** ${TODAY} — ${REPO}"
          [ -n "$PRS" ]     && MSG="$MSG"$'\n\n'"🟢 **マージ判断待ちPR(最大10件)**"$'\n'"$PRS"
          [ -n "$DEPLOY" ]  && MSG="$MSG"$'\n\n'"🚀 **デプロイ判断**"$'\n'"$DEPLOY"
          [ -n "$AF" ]      && MSG="$MSG"$'\n\n'"⚠️ **自動処理が失敗(automation-failed)**"$'\n'"$AF"
          [ -n "$NH" ]      && MSG="$MSG"$'\n\n'"🙋 **あなたの判断待ち**"$'\n'"$NH"
          [ -n "$NI" ]      && MSG="$MSG"$'\n\n'"⏳ **報告者の回答待ち(停滞していたら催促)**"$'\n'"$NI"
          [ -n "$NOLABEL" ] && MSG="$MSG"$'\n\n'"🏷 **トリアージ漏れ(ラベル無し)**"$'\n'"$NOLABEL"
          [ -n "$AITODO" ]  && MSG="$MSG"$'\n\n'"🤖 **AI作業中(結果待ち)**"$'\n'"$AITODO"

          if [ -z "${PRS}${DEPLOY}${AF}${NH}${NI}${NOLABEL}${AITODO}" ]; then
            MSG="$MSG"$'\n\n'"✅ 今日対応が必要なものはありません"
          fi

          MSG="$MSG"$'\n\n'"PR一覧: <https://github.com/${REPO}/pulls>"$'\n'"Issue一覧: <https://github.com/${REPO}/issues>"$'\n'"※未対応の項目は明朝また再掲されます"

          # Discord content の上限(2000文字)を超えないよう分割送信する。
          while [ "${#MSG}" -gt 1900 ]; do
            CHUNK="${MSG:0:1900}"
            MSG="${MSG:1900}"
            jq -n --arg content "$CHUNK" '{content: $content}' \
              | curl -sf -H "Content-Type: application/json" -d @- "$WEBHOOK"
            sleep 1
          done
          jq -n --arg content "$MSG" '{content: $content}' \
            | curl -sf -H "Content-Type: application/json" -d @- "$WEBHOOK"
