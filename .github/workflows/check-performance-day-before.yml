name: 公演中止判定（前日チェック）

on:
  schedule:
    - cron: '30 14 * * *'  # 23:30 JST (14:59 UTCまで29分の余裕を確保)
  workflow_dispatch:        # GitHub UI からの手動実行（失敗時の再実行用）

jobs:
  check:
    name: 前日中止判定
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 23:59 JST (14:59 UTC) まで待機
        # GitHub Actions の cron は高負荷時に数分〜数時間遅延することがある。
        # 30分早くキューに積んでおき、目標時刻になるまで sleep で待機することで
        # 実行時刻を 23:59 JST に固定する。
        run: |
          TARGET_UTC="14:59:00"
          echo "⏳ 目標時刻 (UTC): ${TARGET_UTC}"
          while true; do
            CURRENT=$(date -u +%H:%M:%S)
            if [[ "$CURRENT" > "$TARGET_UTC" ]] || [[ "$CURRENT" == "$TARGET_UTC" ]]; then
              echo "✅ 目標時刻に到達: ${CURRENT} UTC (= JST 23:59)"
              break
            fi
            echo "⏳ 待機中... 現在 ${CURRENT} UTC"
            sleep 10
          done

      - name: target_date を計算（翌日 JST）
        id: date
        # 14:59 UTC 時点では UTC 日付はまだ当日（UTCの日付変更は 00:00 UTC = 09:00 JST）。
        # よって UTC +1 day = 公演対象日（翌日 JST）が正確に求まる。
        run: echo "target_date=$(date -u -d '+1 day' '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: 公演中止判定 Edge Function を呼び出し
        run: |
          echo "📅 対象日: ${{ steps.date.outputs.target_date }}"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d "{\"check_type\":\"day_before\",\"target_date\":\"${{ steps.date.outputs.target_date }}\"}" \
            "https://${{ secrets.SUPABASE_PROD_PROJECT_ID }}.supabase.co/functions/v1/check-performance-cancellation")

          echo "📊 レスポンス:"
          cat /tmp/response.json | python3 -m json.tool 2>/dev/null || cat /tmp/response.json
          echo ""
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Edge Function がエラーを返しました (HTTP $HTTP_STATUS)"
            exit 1
          fi

          echo "✅ 公演中止判定が正常に完了しました"
