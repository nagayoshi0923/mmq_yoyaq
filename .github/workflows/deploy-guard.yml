name: Deploy Guard

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, closed]

permissions:
  pull-requests: write
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate deploy safety
        env:
          GH_TOKEN: ${{ secrets.GUARD_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          gh label create do-not-merge --color B60205 --description "Deploy Guard: マージ待機中" -R "$REPO" 2>/dev/null || true

          STAGING_PRS=$(gh pr list -R "$REPO" --base staging --state open --json number,title,isDraft \
            --jq '[.[] | select(.isDraft|not)] | sort_by(.number)')

          BLOCKERS=$(echo "$STAGING_PRS" | jq -r 'to_entries | map("- 【▶\(.key+1)】 #\(.value.number) \(.value.title | gsub("^【▶[0-9]+】 *"; ""))") | join("\n")')

          # staging側PRに処理順の採番(古い順)。マージされるたび自動で振り直し
          echo "$STAGING_PRS" | jq -c 'to_entries[]' | while read -r ent; do
            IDX=$(echo "$ent" | jq -r '.key + 1')
            NUM=$(echo "$ent" | jq -r '.value.number')
            TITLE=$(echo "$ent" | jq -r '.value.title')
            BASE=$(echo "$TITLE" | sed -E 's/^【▶[0-9]+】 *//')
            NEW="【▶${IDX}】$BASE"
            if [ "$NEW" != "$TITLE" ]; then
              gh pr edit "$NUM" -R "$REPO" --title "$NEW" || true
            fi
          done

          BLOCK_MSG="# 🛑 Deploy Guard: マージ停止中"$'\n\n'"**stagingに未マージの修正PRが残っています。**今マージすると未修正の変更が本番に反映されます。タイトルの【▶番号】順に処理してください:"$'\n\n'"$BLOCKERS"$'\n\n'"すべてマージ(または明示的にクローズ)されると、タイトルが【✅マージ可】に変わり✅コメントが付きます。緊急時のみ force-deploy ラベルでスキップ可。"
          READY_MSG="# ✅ Deploy Guard: マージ可能"$'\n\n'"stagingの未マージPRがすべて処理されました。安心してマージできます。"

          gh pr list -R "$REPO" --base main --state open --json number,title,isDraft,labels | \
            jq -c '.[]' | while read -r pr; do
            NUM=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            DRAFT=$(echo "$pr" | jq -r '.isDraft')
            FORCE=$(echo "$pr" | jq -r '[.labels[].name] | contains(["force-deploy"])')
            HELD=$(echo "$pr" | jq -r '[.labels[].name] | contains(["do-not-merge"])')

            BASE_TITLE=$(echo "$TITLE" | sed -E 's/^【(🛑 *待機中|✅ *マージ可)】 *//')

            if [ "$FORCE" = "true" ]; then
              echo "#$NUM は force-deploy によりガード対象外"
              continue
            fi

            if [ -n "$BLOCKERS" ]; then
              NEW_TITLE="【🛑待機中】$BASE_TITLE"
              if [ "$NEW_TITLE" != "$TITLE" ]; then
                gh pr edit "$NUM" -R "$REPO" --title "$NEW_TITLE" || true
              fi
              if [ "$HELD" != "true" ]; then
                gh pr edit "$NUM" -R "$REPO" --add-label "do-not-merge" || true
                gh pr ready "$NUM" -R "$REPO" --undo || echo "Draft化はスキップ(GUARD_TOKEN未設定でもタイトル/ラベル運用で機能します)"
                gh pr comment "$NUM" -R "$REPO" --body "$BLOCK_MSG" || true
              fi
            else
              NEW_TITLE="【✅マージ可】$BASE_TITLE"
              if [ "$NEW_TITLE" != "$TITLE" ]; then
                gh pr edit "$NUM" -R "$REPO" --title "$NEW_TITLE" || true
              fi
              if [ "$HELD" = "true" ] || [ "$DRAFT" = "true" ]; then
                gh pr edit "$NUM" -R "$REPO" --remove-label "do-not-merge" || true
                gh pr ready "$NUM" -R "$REPO" || echo "Ready化はスキップ(Draft解除は手動で)"
                gh pr comment "$NUM" -R "$REPO" --body "$READY_MSG" || true
              fi
            fi
          done
