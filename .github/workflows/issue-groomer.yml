name: Issue Groomer
on:
  issues:
    types: [opened]

jobs:
  groom:
    if: contains(github.event.issue.body, 'discord.com/channels')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            まず .github/issue-groomer-prompt.md を Read ツールで読んでください(読まずに作業を始めない)。
            そこに書かれた指示に厳密に従って、issue #${{ github.event.issue.number }} を整形してください。
            gh コマンドで実際にタイトル・本文の編集とコメント投稿を完了するところまでやり切ること。
          claude_args: |
            --allowedTools "Read,Glob,Grep,LS,Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh label create:*)"
