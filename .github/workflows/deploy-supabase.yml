name: Deploy Supabase

on:
  push:
    branches: [main, staging]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイ先環境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

jobs:
  # ============================================================================
  # ステージング環境へのデプロイ
  # stagingブランチへのpush時に実行
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.48.3

      - name: Link to Staging Project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_STAGING_PROJECT_ID }}

      - name: Run Database Migrations
        run: |
          echo "📦 Running database migrations on staging..."
          supabase db push

      - name: Deploy Edge Functions
        run: |
          echo "⚡ Deploying Edge Functions to staging..."
          # JWT検証をゲートウェイでスキップする関数（関数内で検証を行う）
          NO_VERIFY_JWT_FUNCTIONS=(
            "delete-my-account"
            "send-cancellation-confirmation"
            "send-private-booking-confirmation"
            "send-private-booking-rejection"
            "send-booking-change-confirmation"
            "auto-send-reminder-emails"
            "send-email"
            "send-booking-confirmation"
            "send-reminder-emails"
            "notify-private-booking-discord"
            "discord-interactions"
            "discord-shift-interactions"
            "notify-shift-request-discord"
            "notify-shift-submitted-discord"
            "notify-shift-reminder-discord"
            "process-waitlist-queue"
            "process-booking-email-queue"
            "notify-waitlist"
            "check-performance-cancellation"
            "check-inventory-consistency"
            "schedule-reminder-emails"
            "retry-discord-notifications"
            "quick-processor"
            "tweet-available-seats"
            "sync-shifts-to-google-sheet"
            "send-contact-inquiry"
            "send-author-report"
            "notify-kit-transfer-plan"
          )
          
          # すべての関数をデプロイ
          for func_dir in supabase/functions/*/; do
            func=$(basename "$func_dir")
            # _shared などのヘルパーディレクトリはスキップ
            if [[ "$func" == _* ]]; then
              continue
            fi
            # JWT検証スキップリストに含まれるか確認
            no_verify=false
            for no_jwt_func in "${NO_VERIFY_JWT_FUNCTIONS[@]}"; do
              if [ "$func" == "$no_jwt_func" ]; then
                no_verify=true
                break
              fi
            done
            if [ "$no_verify" = true ]; then
              echo "🔓 Deploying $func with --no-verify-jwt..."
              supabase functions deploy "$func" --no-verify-jwt
            else
              echo "🔒 Deploying $func..."
              supabase functions deploy "$func"
            fi
          done

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Staging deployment completed successfully!"
          echo "🔗 Staging URL: https://${{ secrets.SUPABASE_STAGING_PROJECT_ID }}.supabase.co"

  # ============================================================================
  # 本番環境へのデプロイ
  # mainブランチへのpush時に実行
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.48.3

      - name: Link to Production Project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_ID }}

      - name: Run Database Migrations
        run: |
          echo "📦 Running database migrations on production..."
          supabase db push

      - name: Deploy Edge Functions
        run: |
          echo "⚡ Deploying Edge Functions to production..."
          # JWT検証をゲートウェイでスキップする関数（関数内で検証を行う）
          NO_VERIFY_JWT_FUNCTIONS=(
            "delete-my-account"
            "send-cancellation-confirmation"
            "send-private-booking-confirmation"
            "send-private-booking-rejection"
            "send-booking-change-confirmation"
            "auto-send-reminder-emails"
            "send-email"
            "send-booking-confirmation"
            "send-reminder-emails"
            "notify-private-booking-discord"
            "discord-interactions"
            "discord-shift-interactions"
            "notify-shift-request-discord"
            "notify-shift-submitted-discord"
            "notify-shift-reminder-discord"
            "process-waitlist-queue"
            "process-booking-email-queue"
            "notify-waitlist"
            "check-performance-cancellation"
            "check-inventory-consistency"
            "schedule-reminder-emails"
            "retry-discord-notifications"
            "quick-processor"
            "tweet-available-seats"
            "sync-shifts-to-google-sheet"
            "send-contact-inquiry"
            "send-author-report"
            "notify-kit-transfer-plan"
          )
          
          # すべての関数をデプロイ
          for func_dir in supabase/functions/*/; do
            func=$(basename "$func_dir")
            # _shared などのヘルパーディレクトリはスキップ
            if [[ "$func" == _* ]]; then
              continue
            fi
            # JWT検証スキップリストに含まれるか確認
            no_verify=false
            for no_jwt_func in "${NO_VERIFY_JWT_FUNCTIONS[@]}"; do
              if [ "$func" == "$no_jwt_func" ]; then
                no_verify=true
                break
              fi
            done
            if [ "$no_verify" = true ]; then
              echo "🔓 Deploying $func with --no-verify-jwt..."
              supabase functions deploy "$func" --no-verify-jwt
            else
              echo "🔒 Deploying $func..."
              supabase functions deploy "$func"
            fi
          done

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Production deployment completed successfully!"
          echo "🔗 Production URL: https://${{ secrets.SUPABASE_PROD_PROJECT_ID }}.supabase.co"

  # ============================================================================
  # PRでのマイグレーション検証（ドライラン）
  # ============================================================================
  validate-migrations:
    name: Validate Migrations (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.48.3

      - name: Start Supabase Local
        run: |
          supabase start

      - name: Validate Migrations
        run: |
          echo "🔍 Validating migrations locally..."
          supabase db reset

      - name: Smoke Test RPC Functions
        run: |
          echo "🧪 Running RPC smoke tests..."
          psql "$(supabase status --output json | jq -r '.DB_URL')" -f supabase/tests/smoke_test_rpcs.sql

      - name: Stop Supabase Local
        if: always()
        run: |
          supabase stop
