name: Cursor Cloud Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  cursor-review:
    # draft を除外し、fork からの PR では secrets を使わない（同一リポジトリ内ブランチのみ）
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: scripts/cursor-cloud/package-lock.json

      - name: Install Cursor SDK
        run: npm ci --prefix scripts/cursor-cloud

      - name: Build review prompt
        id: prompt
        env:
          GH_TOKEN: ${{ secrets.GUARD_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          PROMPT_FILE: ${{ runner.temp }}/cursor-prompt.md
        run: |
          set -euo pipefail
          PR_JSON=$(gh pr view "$PR" -R "$REPO" --json number,title,body,baseRefName,headRefName)
          {
            echo "あなたは Cursor Cloud Agent（分析専用・plan モード）です。コードは一切変更しないこと。"
            echo "この PR（#${PR}）を日本語でレビューしてください。クローンされたリポジトリと PR の差分を確認できます。"
            echo ""
            echo "PR メタデータ:"
            echo '```json'
            echo "$PR_JSON"
            echo '```'
            echo ""
            echo "## レビュー観点"
            echo "- バグ・ロジックエラー・エッジケースを最優先で指摘する。"
            echo "- organization_id によるマルチテナント分離が維持されているか。"
            echo "- reservation_source が src/lib/constants.ts の定数を使っているか。"
            echo "- RLS ポリシーの直接変更が含まれていないか（SECURITY DEFINER RPC で対応する方針）。"
            echo "- セキュリティ（入力検証・認可漏れ・個人情報の露出）。"
            echo "- 明らかなパフォーマンス問題（N+1・無制限フェッチなど）。"
            echo "- 重要度の低いスタイル指摘は省略してよい。"
            echo ""
            echo "## 出力（最後に必ず出す）"
            echo "厳密な JSON 1個のみを出力すること（前後の説明・コードフェンスなし）:"
            echo '{ "summary": "日本語の総評", "mergeRecommendation": "merge" | "fix" | "discuss", "findings": [ { "path": "ファイルパス", "line": <PR head の RIGHT 側の行番号>, "body": "日本語の指摘" } ] }'
            echo "findings が無ければ空配列。gh 実行・コード変更・GitHub への書き込みは禁止（コメント投稿は Actions 側が行う）。"
          } > "$PROMPT_FILE"
          echo "file=$PROMPT_FILE" >> "$GITHUB_OUTPUT"

      - name: Run Cursor Cloud review
        timeout-minutes: 30
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_PROMPT_FILE: ${{ steps.prompt.outputs.file }}
          CURSOR_RESULT_FILE: ${{ runner.temp }}/cursor-result.json
          CURSOR_REPO_URL: https://github.com/${{ github.repository }}
          CURSOR_PR_URL: ${{ github.event.pull_request.html_url }}
          CURSOR_AUTO_CREATE_PR: 'false'
          CURSOR_WORK_ON_CURRENT_BRANCH: 'false'
          CURSOR_MODE: plan
          CURSOR_MODEL: ${{ vars.CURSOR_MODEL || 'auto' }}
          CURSOR_AGENT_NAME: MMQ Cursor Cloud Review #${{ github.event.pull_request.number }}
          CURSOR_IDEMPOTENCY_KEY: mmq-review-${{ github.run_id }}-${{ github.event.pull_request.number }}
        run: node scripts/cursor-cloud/run.mjs

      - name: Post review comments
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GUARD_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          RESULT_FILE: ${{ runner.temp }}/cursor-result.json
        run: |
          set -uo pipefail
          MARKER='<!-- cursor-cloud-review -->'

          post_toplevel() {
            local body="$1"
            local cid
            cid=$(gh api "repos/$REPO/issues/$PR/comments" --jq "[.[] | select(.body | contains(\"$MARKER\"))][0].id // empty" 2>/dev/null || echo "")
            if [ -n "$cid" ]; then
              gh api -X PATCH "repos/$REPO/issues/comments/$cid" -f body="$body" >/dev/null || true
            else
              printf '%s' "$body" | gh pr comment "$PR" -R "$REPO" --body-file - || true
            fi
          }

          if [ ! -f "$RESULT_FILE" ]; then
            post_toplevel "$MARKER"$'\n'"## 🤖 Cursor Cloud レビュー"$'\n\n'"レビューを実行できませんでした（結果ファイルなし）。人間が確認してください。"
            exit 0
          fi
          STATUS=$(jq -r '.status // ""' "$RESULT_FILE")
          RAW=$(jq -r '.result // ""' "$RESULT_FILE")
          DEC=$(printf '%s\n' "$RAW" | sed -E '/^```/d')

          if [ "$STATUS" != "finished" ] || ! printf '%s' "$DEC" | jq -e 'has("summary")' >/dev/null 2>&1; then
            post_toplevel "$MARKER"$'\n'"## 🤖 Cursor Cloud レビュー"$'\n\n'"レビューが正常に完了しませんでした（status=${STATUS}）。人間が確認してください。"
            exit 0
          fi

          SUMMARY=$(printf '%s' "$DEC" | jq -r '.summary // ""')
          REC=$(printf '%s' "$DEC" | jq -r '.mergeRecommendation // "discuss"')
          case "$REC" in
            merge)   REC_JP="そのままマージ可" ;;
            fix)     REC_JP="修正後にマージ" ;;
            *)       REC_JP="要議論" ;;
          esac

          SHA=$(gh pr view "$PR" -R "$REPO" --json headRefOid --jq '.headRefOid')
          LEN=$(printf '%s' "$DEC" | jq '(.findings // []) | length')
          FAILED=""
          i=0
          while [ "$i" -lt "$LEN" ]; do
            P=$(printf '%s' "$DEC" | jq -r ".findings[$i].path // \"\"")
            L=$(printf '%s' "$DEC" | jq -r ".findings[$i].line // 0")
            B=$(printf '%s' "$DEC" | jq -r ".findings[$i].body // \"\"")
            i=$((i+1))
            if [ -z "$P" ] || [ "$L" = "0" ] || [ -z "$B" ]; then
              [ -n "$B" ] && FAILED="${FAILED}"$'\n'"- \`${P}:${L}\` ${B}"
              continue
            fi
            if ! gh api "repos/$REPO/pulls/$PR/comments" \
                -f body="$B" -f commit_id="$SHA" -f path="$P" -F line="$L" -f side=RIGHT >/dev/null 2>&1; then
              FAILED="${FAILED}"$'\n'"- \`${P}:${L}\` ${B}"
            fi
          done

          BODY="$MARKER"$'\n'"## 🤖 Cursor Cloud レビュー総評"$'\n\n'"$SUMMARY"$'\n\n'"**マージ可否の推奨**: ${REC_JP}"
          if [ -n "$FAILED" ]; then
            BODY="$BODY"$'\n\n'"### インラインで投稿できなかった指摘"$'\n'"$FAILED"
          fi
          post_toplevel "$BODY"
