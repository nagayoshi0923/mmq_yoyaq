name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging, develop]

jobs:
  verify:
    name: Verify (typecheck, lint, build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Security guardrails
        run: npm run check:security-guardrails

      - name: JST date guard
        run: npm run check:jst-date

      - name: Audit anon RLS / GRANT consistency
        # Supabase Management API (HTTPS) 経由で staging に対して監査クエリを投げる。
        # 直接 DB 接続 (db.<ref>.supabase.co) は GitHub Actions runner の IPv6 不通で使えない。
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npm run check:anon-rls-grants

      - name: Build
        run: npm run build:fast

